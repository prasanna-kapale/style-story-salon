<!--
  STYLE STORY LOGOMARK — reference component
  Recreates the real signage: straight vertical lines on the left
  transitioning into flowing wave-strands on the right.
  viewBox 0 0 120 100, stroke-based, currentColor so it inherits
  text color (works on dark or light backgrounds).

  Usage: copy the <svg>...</svg> block wherever the mark is needed,
  or reference via <img src="assets/logomark.svg">
-->
<svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round">
  <!-- straight lines (hair at rest) -->
  <line x1="8"  y1="14" x2="8"  y2="86"/>
  <line x1="20" y1="14" x2="20" y2="86"/>
  <line x1="32" y1="14" x2="32" y2="86"/>
  <line x1="44" y1="14" x2="44" y2="86"/>
  <!-- transitional strand -->
  <path d="M56,14 C56,40 70,40 70,60 C70,80 56,80 56,86"/>
  <!-- flowing wave strands (hair in motion) -->
  <path d="M70,14 C90,30 50,45 70,60 C90,75 78,80 86,86"/>
  <path d="M84,14 C100,32 68,48 88,62 C100,72 96,78 100,86"/>
  <path d="M98,16 C108,30 92,40 102,52 C112,64 104,76 110,86"/>
</svg>
